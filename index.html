<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ─── Tokens: light ─── */
  :root {
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-200: #EF9F27;
    --amber-600: #854F0B; --amber-800: #633806; --amber-900: #412402;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
    --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441; --gray-900: #2C2C2A;
    --teal-50: #E1F5EE; --teal-600: #0F6E56;
    --coral-50: #FAECE7; --coral-200: #F0997B; --coral-600: #993C1D;
    --blue-50: #E6F1FB; --blue-200: #85B7EB; --blue-600: #185FA5;
    --bg: #FAF8F4; --surface: #FFFFF8;
    --border: rgba(66,36,2,0.12); --border-mid: rgba(66,36,2,0.2);
    --text: #2C2C2A; --text-muted: #888780; --text-light: #B4B2A9;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  /* ─── Tokens: dark ─── */
  [data-theme="dark"] {
    --amber-50: #3a2200; --amber-100: #7a4500; --amber-200: #EF9F27;
    --amber-600: #FAC775; --amber-800: #FAEEDA; --amber-900: #fff3dc;
    --gray-50: #1e1d1b; --gray-100: #2e2d2b; --gray-200: #3e3d3a;
    --gray-400: #888780; --gray-600: #aaa9a3; --gray-800: #d0cfc8; --gray-900: #f0efe8;
    --teal-50: #0a2018; --teal-600: #5DCAA5;
    --coral-50: #2a100a; --coral-200: #993C1D; --coral-600: #F0997B;
    --blue-50: #0a1828; --blue-200: #185FA5; --blue-600: #85B7EB;
    --bg: #161513; --surface: #1f1e1b;
    --border: rgba(255,220,150,0.1); --border-mid: rgba(255,220,150,0.2);
    --text: #f0efe8; --text-muted: #888780; --text-light: #555450;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; transition: background 0.2s, color 0.2s; }

  /* ─── Header ─── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .brand { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 500; color: var(--amber-900); letter-spacing: -0.02em; }
  .brand span { color: var(--amber-200); }
  .header-actions { display: flex; gap: 0.5rem; align-items: center; }

  /* ─── Theme toggle ─── */
  .theme-toggle { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.6rem; cursor: pointer; color: var(--text-muted); font-size: 15px; line-height: 1; transition: all 0.15s; }
  .theme-toggle:hover { border-color: var(--amber-200); color: var(--amber-200); }

  /* ─── Main ─── */
  main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* ─── Status banner ─── */
  .status-banner { font-size: 13px; color: var(--text-muted); padding: 0.5rem 0.875rem; background: var(--gray-50); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1.25rem; display: none; }
  .status-banner.visible { display: block; }

  /* ─── Stats ─── */
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 500; color: var(--amber-900); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text-light); margin-top: 0.2rem; }

  /* ─── Toolbar ─── */
  .toolbar { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  input[type="search"] { font-family: 'DM Sans', sans-serif; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.55rem 0.875rem 0.55rem 2.25rem; font-size: 14px; color: var(--text); width: 100%; outline: none; transition: border-color 0.15s; }
  input[type="search"]:focus { border-color: var(--amber-200); }
  select.sort-select { font-family: 'DM Sans', sans-serif; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.875rem; font-size: 13px; color: var(--text); cursor: pointer; outline: none; }

  .filter-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.5rem; align-items: center; }
  .filter-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.06em; margin-right: 0.25rem; white-space: nowrap; }

  /* ─── Pills ─── */
  .pill { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 0.3rem 0.75rem; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .pill:hover { border-color: var(--amber-100); color: var(--amber-800); }
  .pill.active { background: var(--amber-900); border-color: var(--amber-900); color: var(--amber-50); }
  .pill.tag-pill.active { background: var(--blue-600); border-color: var(--blue-600); color: #fff; }

  /* ─── Pagination ─── */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; flex-wrap: wrap; }
  .page-info { font-size: 13px; color: var(--text-muted); }

  /* ─── Book grid ─── */
  .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .book-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; transition: border-color 0.15s, box-shadow 0.15s; }
  .book-card:hover { border-color: var(--border-mid); box-shadow: var(--shadow); }
  .book-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 500; color: var(--amber-900); line-height: 1.3; }
  .book-author { font-size: 13px; color: var(--text-muted); }
  .book-series { font-size: 12px; color: var(--text-light); font-style: italic; }
  .book-meta { display: flex; gap: 0.35rem; align-items: center; flex-wrap: wrap; margin-top: 0.1rem; }
  .book-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; }
  .book-notes { font-size: 12px; color: var(--text-muted); font-style: italic; line-height: 1.4; }
  .book-actions { display: flex; gap: 0.5rem; margin-top: auto; padding-top: 0.4rem; }

  /* ─── Badges ─── */
  .badge { font-size: 11px; font-weight: 500; padding: 0.15rem 0.55rem; border-radius: 999px; letter-spacing: 0.02em; }
  .badge-physical { background: var(--amber-50); color: var(--amber-800); }
  .badge-ebook    { background: var(--blue-50);  color: var(--blue-600);  }
  .badge-audio    { background: var(--teal-50);  color: var(--teal-600);  }
  .badge-read     { background: var(--teal-50);  color: var(--teal-600);  }
  .badge-reading  { background: var(--amber-50); color: var(--amber-800); }
  .badge-want     { background: var(--gray-50);  color: var(--gray-600);  }
  .badge-tag      { background: var(--blue-50);  color: var(--blue-600);  font-size: 10px; }
  .stars { color: var(--amber-200); font-size: 13px; letter-spacing: 1px; }
  .stars .empty { color: var(--gray-100); }

  /* ─── Buttons ─── */
  .btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 0.45rem 0.9rem; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 0.35rem; }
  .btn:hover { border-color: var(--border-mid); background: var(--gray-50); }
  .btn-primary { background: var(--amber-900); border-color: var(--amber-900); color: var(--amber-50); }
  .btn-primary:hover { background: var(--amber-800); border-color: var(--amber-800); }
  .btn-danger { color: var(--coral-600); }
  .btn-danger:hover { background: var(--coral-50); border-color: var(--coral-200); }
  .btn-sm { font-size: 12px; padding: 0.3rem 0.65rem; }

  /* ─── Modal ─── */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1.5rem; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--surface); border-radius: 14px; border: 1px solid var(--border-mid); width: 100%; max-width: 520px; padding: 1.75rem; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 500; color: var(--amber-900); margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
  input[type="text"].plain, textarea, select.plain {
    font-family: 'DM Sans', sans-serif; width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.6rem 0.875rem; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s;
  }
  input[type="text"].plain:focus, textarea:focus, select.plain:focus { border-color: var(--amber-200); }
  textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .radio-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .radio-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 0.4rem 0.9rem; border-radius: 999px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer; transition: all 0.15s; user-select: none; }
  .radio-btn.active { background: var(--amber-900); border-color: var(--amber-900); color: var(--amber-50); }
  input[type="radio"], input[type="checkbox"] { display: none; }
  .star-picker { display: flex; gap: 4px; }
  .star-btn { font-size: 22px; cursor: pointer; color: var(--gray-100); background: none; border: none; transition: color 0.1s, transform 0.1s; line-height: 1; padding: 0; }
  .star-btn.lit { color: var(--amber-200); }
  .star-btn:hover { transform: scale(1.2); }
  .modal-footer { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.25rem; }
  .hint { font-size: 11px; color: var(--text-light); margin-top: 0.3rem; }

  /* ─── Empty state ─── */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); grid-column: 1/-1; }
  .empty-state svg { margin-bottom: 1rem; opacity: 0.3; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--amber-900); margin-bottom: 0.5rem; }

  #importFile { display: none; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-100); border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 1.25rem 1rem; }
    .brand { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">My<span>·</span>Library</div>
  <div class="header-actions">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" id="themeBtn">🌙</button>
    <button class="btn btn-sm" onclick="exportData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import
    </button>
    <input type="file" id="importFile" accept=".json" onchange="importData(event)">
    <button class="btn btn-primary" onclick="openAddModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add book
    </button>
  </div>
</header>

<main>
  <div class="status-banner" id="statusBanner"></div>
  <div class="stats-bar" id="statsBar"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="searchInput" placeholder="Search title, author, series, or tag…" oninput="debouncedRender()">
    </div>
    <select class="sort-select" id="sortSelect" onchange="render()">
      <option value="added-desc">Newest added</option>
      <option value="added-asc">Oldest added</option>
      <option value="title-asc">Title A–Z</option>
      <option value="title-desc">Title Z–A</option>
      <option value="author-asc">Author A–Z</option>
      <option value="rating-desc">Rating ↓</option>
      <option value="series-asc">Series</option>
    </select>
  </div>

  <div class="filter-row">
    <span class="filter-label">Format</span>
    <div id="formatPills" style="display:flex;gap:0.4rem;flex-wrap:wrap;">
      <button class="pill active" onclick="setFilter('format','all',this)">All</button>
      <button class="pill" onclick="setFilter('format','physical',this)">📚 Physical</button>
      <button class="pill" onclick="setFilter('format','ebook',this)">📱 E-book</button>
      <button class="pill" onclick="setFilter('format','audio',this)">🎧 Audio</button>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Status</span>
    <div id="statusPills" style="display:flex;gap:0.4rem;flex-wrap:wrap;">
      <button class="pill active" onclick="setFilter('status','all',this)">All</button>
      <button class="pill" onclick="setFilter('status','read',this)">Read</button>
      <button class="pill" onclick="setFilter('status','reading',this)">Reading</button>
      <button class="pill" onclick="setFilter('status','want',this)">Want to read</button>
    </div>
  </div>
  <div class="filter-row" id="tagFilterRow" style="display:none;">
    <span class="filter-label">Tag</span>
    <div id="tagPills" style="display:flex;gap:0.4rem;flex-wrap:wrap;"></div>
  </div>

  <div class="books-grid" id="booksGrid"></div>
  <div class="pagination" id="pagination"></div>
</main>

<!-- Modal -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add a book</div>

    <div class="form-group">
      <label>Title</label>
      <input type="text" class="plain" id="f-title" placeholder="Book title">
    </div>
    <div class="form-group">
      <label>Author</label>
      <input type="text" class="plain" id="f-author" placeholder="Author name">
    </div>
    <div class="form-group">
      <label>Series <span style="font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-light)">(optional)</span></label>
      <input type="text" class="plain" id="f-series" placeholder="e.g. The Expanse #1">
    </div>
    <div class="form-group">
      <label>Tags <span style="font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-light)">(optional)</span></label>
      <input type="text" class="plain" id="f-tags" placeholder="sci-fi, favorites, gift…">
      <div class="hint">Comma-separated. e.g. sci-fi, favorites</div>
    </div>
    <div class="form-group">
      <label>Format <span style="font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-light)">(select all that apply)</span></label>
      <div class="radio-group" id="f-format-group">
        <label class="radio-btn active" for="fmt-physical">📚 Physical<input type="checkbox" id="fmt-physical" value="physical" checked></label>
        <label class="radio-btn" for="fmt-ebook">📱 E-book<input type="checkbox" id="fmt-ebook" value="ebook"></label>
        <label class="radio-btn" for="fmt-audio">🎧 Audiobook<input type="checkbox" id="fmt-audio" value="audio"></label>
      </div>
      <div id="fmt-error" style="display:none;font-size:12px;color:var(--coral-600);margin-top:0.35rem">Select at least one format.</div>
    </div>
    <div class="form-group">
      <label>Status</label>
      <div class="radio-group">
        <label class="radio-btn active" for="st-want">Want to read<input type="radio" name="status" id="st-want" value="want" checked></label>
        <label class="radio-btn" for="st-reading">Reading<input type="radio" name="status" id="st-reading" value="reading"></label>
        <label class="radio-btn" for="st-read">Read<input type="radio" name="status" id="st-read" value="read"></label>
      </div>
    </div>
    <div class="form-group">
      <label>Rating</label>
      <div class="star-picker">
        <button class="star-btn" type="button" data-val="1" onclick="setRating(1)">★</button>
        <button class="star-btn" type="button" data-val="2" onclick="setRating(2)">★</button>
        <button class="star-btn" type="button" data-val="3" onclick="setRating(3)">★</button>
        <button class="star-btn" type="button" data-val="4" onclick="setRating(4)">★</button>
        <button class="star-btn" type="button" data-val="5" onclick="setRating(5)">★</button>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Optional notes, thoughts, quotes…"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBook()">Save book</button>
    </div>
  </div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────
const REPO_JSON_URL = 'data/books.json';
const PAGE_SIZE = 48;

// ─── State ───────────────────────────────────────────────
function normalizeBook(b) {
  return {
    ...b,
    author: Array.isArray(b.author) ? b.author.join(', ') : (b.author || '').replace(/[;,\s]+$/, ''),
    status: ({'want to read':'want','reading':'reading','read':'read'}[b.status] || b.status || 'want'),
    formats: Array.isArray(b.formats) ? b.formats
      : b.formats ? [b.formats]
      : Array.isArray(b.format) ? b.format
      : b.format ? [b.format]
      : ['physical'],
    tags: Array.isArray(b.tags) ? b.tags
      : (b.tags && typeof b.tags === 'string') ? b.tags.split(',').map(t => t.trim()).filter(Boolean)
      : []
  };
}

let books = JSON.parse(localStorage.getItem('myLibrary') || '[]').map(normalizeBook);
let filters = { format: 'all', status: 'all', tag: 'all' };
let currentPage = 1;
let editingId = null;
let currentRating = 0;
let searchTimer = null;

// ─── Theme ───────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', theme);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
applyTheme(localStorage.getItem('theme') || 'light');

// ─── Repo JSON fetch ─────────────────────────────────────
async function fetchRepoBooks() {
  const banner = document.getElementById('statusBanner');
  try {
    const res = await fetch(REPO_JSON_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const normalized = data.map(normalizeBook);
    const existingIds = new Set(books.map(b => b.id));
    const newBooks = normalized.filter(b => !existingIds.has(b.id));
    if (newBooks.length) {
      books = [...books, ...newBooks];
      save();
      banner.textContent = `✓ Synced ${newBooks.length} new book${newBooks.length > 1 ? 's' : ''} from repo.`;
    } else {
      banner.textContent = `✓ Library up to date (${books.length} books).`;
    }
    banner.classList.add('visible');
    setTimeout(() => banner.classList.remove('visible'), 4000);
  } catch (e) {
    // Silently fall through — offline or file not found, localStorage data is fine
    if (books.length === 0) {
      banner.textContent = 'Could not reach data/books.json — add books manually or import a JSON file.';
      banner.classList.add('visible');
    }
  }
  render();
}

// ─── Persist ─────────────────────────────────────────────
function save() { localStorage.setItem('myLibrary', JSON.stringify(books)); }

// ─── Filters ─────────────────────────────────────────────
function setFilter(type, val, el) {
  filters[type] = val;
  const groupId = { format: 'formatPills', status: 'statusPills', tag: 'tagPills' }[type];
  document.querySelectorAll('#' + groupId + ' .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentPage = 1;
  render();
}

// ─── Debounce search ─────────────────────────────────────
function debouncedRender() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; render(); }, 200);
}

// ─── Tags index ──────────────────────────────────────────
function allTags() {
  const set = new Set();
  books.forEach(b => (b.tags || []).forEach(t => set.add(t)));
  return [...set].sort();
}

function renderTagFilter() {
  const tags = allTags();
  const row = document.getElementById('tagFilterRow');
  const container = document.getElementById('tagPills');
  if (!tags.length) { row.style.display = 'none'; return; }
  row.style.display = 'flex';
  const current = filters.tag;
  container.innerHTML = [
    `<button class="pill tag-pill ${current === 'all' ? 'active' : ''}" onclick="setFilter('tag','all',this)">All</button>`,
    ...tags.map(t => `<button class="pill tag-pill ${current === t ? 'active' : ''}" onclick="setFilter('tag',${JSON.stringify(t)},this)">${esc(t)}</button>`)
  ].join('');
}

// ─── Stats ───────────────────────────────────────────────
function renderStats() {
  const total = books.length;
  const read = books.filter(b => b.status === 'read').length;
  const physical = books.filter(b => b.formats.includes('physical')).length;
  const ebook    = books.filter(b => b.formats.includes('ebook')).length;
  const audio    = books.filter(b => b.formats.includes('audio')).length;
  const rated    = books.filter(b => b.rating > 0);
  const avg = rated.length ? (rated.reduce((s,b) => s + b.rating, 0) / rated.length).toFixed(1) : '—';
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div><div class="stat-sub">${read} read · ${books.filter(b=>b.status==='reading').length} in progress</div></div>
    <div class="stat-card"><div class="stat-label">Physical</div><div class="stat-value">${physical}</div><div class="stat-sub">${total ? Math.round(physical/total*100) : 0}% of library</div></div>
    <div class="stat-card"><div class="stat-label">E-books</div><div class="stat-value">${ebook}</div><div class="stat-sub">${total ? Math.round(ebook/total*100) : 0}% of library</div></div>
    <div class="stat-card"><div class="stat-label">Audiobooks</div><div class="stat-value">${audio}</div><div class="stat-sub">${total ? Math.round(audio/total*100) : 0}% of library</div></div>
    <div class="stat-card"><div class="stat-label">Avg rating</div><div class="stat-value">${avg}</div><div class="stat-sub">${rated.length} rated</div></div>`;
}

// ─── Render ───────────────────────────────────────────────
function render() {
  renderStats();
  renderTagFilter();
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort  = document.getElementById('sortSelect').value;

  let filtered = books.filter(b => {
    if (filters.format !== 'all' && !b.formats.includes(filters.format)) return false;
    if (filters.status !== 'all' && b.status !== filters.status) return false;
    if (filters.tag    !== 'all' && !(b.tags || []).includes(filters.tag)) return false;
    if (query) {
      const hay = [b.title, b.author, b.series, ...(b.tags||[])].join(' ').toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    switch (sort) {
      case 'added-asc':  return a.id - b.id;
      case 'title-asc':  return a.title.localeCompare(b.title);
      case 'title-desc': return b.title.localeCompare(a.title);
      case 'author-asc': return (a.author||'').localeCompare(b.author||'');
      case 'rating-desc':return (b.rating||0) - (a.rating||0);
      default:           return b.id - a.id;
    }
  });

  const grid = document.getElementById('booksGrid');
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <h3>${books.length === 0 ? 'Your library is empty' : 'No books match your filters'}</h3>
      <p style="font-size:14px">${books.length === 0 ? 'Add a book or import a JSON file.' : 'Try adjusting your search or filters.'}</p>
    </div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const page = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  const fmtLabels = { physical:'📚 Physical', ebook:'📱 E-book', audio:'🎧 Audiobook' };
  const fmtCls    = { physical:'badge-physical', ebook:'badge-ebook', audio:'badge-audio' };
  const stCls     = { read:'badge-read', reading:'badge-reading', want:'badge-want' };
  const stLabel   = { read:'Read', reading:'Reading', want:'Want to read' };

  // Build HTML as array then join — faster than string concat
  const html = page.map(b => {
    const fmtBadges = b.formats.map(f => `<span class="badge ${fmtCls[f]}">${fmtLabels[f]}</span>`).join('');
    const tagBadges = (b.tags||[]).map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join('');
    const stars = b.rating ? '★'.repeat(b.rating) + `<span class="empty">${'★'.repeat(5-b.rating)}</span>` : '';
    return `<div class="book-card">
      <div class="book-title">${esc(b.title)}</div>
      ${b.author ? `<div class="book-author">${esc(b.author)}</div>` : ''}
      ${b.series ? `<div class="book-series">📖 ${esc(b.series)}</div>` : ''}
      <div class="book-meta">
        ${fmtBadges}
        <span class="badge ${stCls[b.status]}">${stLabel[b.status]}</span>
        ${stars ? `<span class="stars">${stars}</span>` : ''}
      </div>
      ${tagBadges ? `<div class="book-tags">${tagBadges}</div>` : ''}
      ${b.notes ? `<div class="book-notes">${esc(b.notes)}</div>` : ''}
      <div class="book-actions">
        <button class="btn btn-sm" onclick="openEditModal(${b.id})">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </button>
        <button class="btn btn-sm btn-danger" onclick="deleteBook(${b.id})">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
      </div>
    </div>`;
  });

  // Use a DocumentFragment to do a single DOM update
  const frag = document.createDocumentFragment();
  const tmp = document.createElement('div');
  tmp.innerHTML = html.join('');
  while (tmp.firstChild) frag.appendChild(tmp.firstChild);
  grid.innerHTML = '';
  grid.appendChild(frag);

  // Pagination
  renderPagination(filtered.length, totalPages);
}

function renderPagination(total, totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end   = Math.min(currentPage * PAGE_SIZE, total);
  let html = `<span class="page-info">${start}–${end} of ${total}</span>`;
  html += `<button class="btn btn-sm" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
  // Show a window of pages
  const w = 2;
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || (p >= currentPage - w && p <= currentPage + w)) {
      html += `<button class="btn btn-sm ${p===currentPage?'btn-primary':''}" onclick="goPage(${p})">${p}</button>`;
    } else if (p === currentPage - w - 1 || p === currentPage + w + 1) {
      html += `<span class="page-info">…</span>`;
    }
  }
  html += `<button class="btn btn-sm" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next ›</button>`;
  pg.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  render();
  document.getElementById('booksGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── Escape ───────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Modal helpers ────────────────────────────────────────
function setFormats(vals) {
  document.querySelectorAll('#f-format-group input[type="checkbox"]').forEach(cb => {
    cb.checked = vals.includes(cb.value);
    cb.closest('.radio-btn').classList.toggle('active', cb.checked);
  });
}
function setRadio(name, val) {
  document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
    r.checked = r.value === val;
    r.closest('.radio-btn').classList.toggle('active', r.value === val);
  });
}
document.querySelectorAll('.radio-btn input[type="radio"]').forEach(r => {
  r.addEventListener('change', function() {
    this.closest('.radio-group').querySelectorAll('.radio-btn').forEach(l => l.classList.remove('active'));
    this.closest('.radio-btn').classList.add('active');
  });
});
document.querySelectorAll('#f-format-group input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', function() {
    this.closest('.radio-btn').classList.toggle('active', this.checked);
  });
});

// ─── Open/close modal ────────────────────────────────────
function openAddModal() {
  editingId = null; currentRating = 0;
  document.getElementById('modalTitle').textContent = 'Add a book';
  ['f-title','f-author','f-series','f-tags','f-notes'].forEach(id => document.getElementById(id).value = '');
  setFormats(['physical']);
  setRadio('status','want');
  updateStars(0);
  document.getElementById('fmt-error').style.display = 'none';
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-title').focus();
}
function openEditModal(id) {
  const b = books.find(x => x.id === id);
  if (!b) return;
  editingId = id; currentRating = b.rating || 0;
  document.getElementById('modalTitle').textContent = 'Edit book';
  document.getElementById('f-title').value  = b.title;
  document.getElementById('f-author').value = b.author || '';
  document.getElementById('f-series').value = b.series || '';
  document.getElementById('f-tags').value   = (b.tags || []).join(', ');
  document.getElementById('f-notes').value  = b.notes || '';
  setFormats(b.formats || ['physical']);
  setRadio('status', b.status);
  updateStars(currentRating);
  document.getElementById('fmt-error').style.display = 'none';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function handleBackdropClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }

// ─── Stars ───────────────────────────────────────────────
function setRating(val) { currentRating = currentRating === val ? 0 : val; updateStars(currentRating); }
function updateStars(val) {
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.classList.toggle('lit', parseInt(btn.dataset.val) <= val);
  });
}

// ─── Save / Delete ───────────────────────────────────────
function saveBook() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const author  = document.getElementById('f-author').value.trim();
  const series  = document.getElementById('f-series').value.trim();
  const tags    = document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const formats = [...document.querySelectorAll('#f-format-group input[type="checkbox"]:checked')].map(cb => cb.value);
  if (!formats.length) { document.getElementById('fmt-error').style.display = 'block'; return; }
  document.getElementById('fmt-error').style.display = 'none';
  const status = document.querySelector('input[name="status"]:checked').value;
  const notes  = document.getElementById('f-notes').value.trim();

  if (editingId !== null) {
    const i = books.findIndex(b => b.id === editingId);
    if (i !== -1) books[i] = { ...books[i], title, author, series, tags, formats, status, notes, rating: currentRating };
  } else {
    books.push({ id: Date.now(), title, author, series, tags, formats, status, notes, rating: currentRating });
  }
  save(); closeModal(); render();
}

function deleteBook(id) {
  const b = books.find(x => x.id === id);
  if (!b || !confirm(`Delete "${b.title}"?`)) return;
  books = books.filter(x => x.id !== id);
  save(); render();
}

// ─── Import / Export ─────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(books, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'my-library.json';
  a.click();
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error('Expected a JSON array');
      if (!confirm(`Import ${data.length} books? Duplicates (by ID) will be skipped.`)) return;
      const existingIds = new Set(books.map(b => b.id));
      const newBooks = data.filter(b => !existingIds.has(b.id)).map(normalizeBook);
      books = [...books, ...newBooks];
      save(); render();
      alert(`Imported ${newBooks.length} new books (${data.length - newBooks.length} duplicates skipped).`);
    } catch(err) { alert('Failed to import: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ─── Init ─────────────────────────────────────────────────
fetchRepoBooks();
</script>
